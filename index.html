    // ====== AUTH WRAPPER ======
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authError, setAuthError] = useState('');

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user || null);
          setAuthLoading(false);
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user || null);
        });
      }, []);

      const handleAuth = async () => {
        setAuthError('');
        const { error } = isSignUp
          ? await supabase.auth.signUp({ email, password })
          : await supabase.auth.signInWithPassword({ email, password });
        if (error) setAuthError(error.message);
        else { setEmail(''); setPassword(''); }
      };

      if (authLoading) return (
        <div className="flex items-center justify-center h-screen" style={{background:'#F2EDE3'}}>
          <p style={{color:'#6B6358'}}>Carregando...</p>
        </div>
      );

      if (!user) return (
        <div className="flex items-center justify-center min-h-screen" style={{background:'linear-gradient(135deg,#2A3B2A,#1E2D24)'}}>

            <p className="text-center text-sm mb-8" style={{color:'#9A8F7E'}}>Investimentos & Aposentadoria</p>
            {authError && <div className="p-3 rounded-lg text-sm mb-4" style={{background:'#FBEBE7',color:'#9B2C2C'}}>{authError}</div>}
            <div className="mb-4">
              <label className="block text-xs uppercase tracking-wider mb-1" style={{color:'#6B6358'}}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                className="w-full px-3 py-2.5 rounded-lg text-sm border"
                style={{background:'#FAF5EA',border:'1px solid #E0D6C3',color:'#1F1B16'}}
                placeholder="seu@email.com" />
            </div>
            <div className="mb-6">
              <label className="block text-xs uppercase tracking-wider mb-1" style={{color:'#6B6358'}}>Senha</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleAuth()}
                className="w-full px-3 py-2.5 rounded-lg text-sm border"
                style={{background:'#FAF5EA',border:'1px solid #E0D6C3',color:'#1F1B16'}}
                placeholder="sua senha" />
            </div>
            <button onClick={handleAuth} className="w-full py-3 rounded-lg font-medium text-sm"
              style={{background:'#2A3B2A',color:'#F2EDE3'}}>
              {isSignUp ? 'Criar Conta' : 'Entrar'}
            </button>
            <div className="text-center mt-4">
              <button onClick={()=>setIsSignUp(!isSignUp)} className="text-sm"
                style={{background:'none',color:'#6B6358',border:'none',cursor:'pointer'}}>
                {isSignUp ? 'Já tem conta? Entrar' : 'Não tem conta? Criar'}
              </button>
            </div>
            <p className="text-xs text-center mt-6" style={{color:'#9A8F7E'}}>
              Seus dados são salvos com segurança e sincronizam entre todos os dispositivos.
            </p>
          </div>
        </div>
      );

      return <FinanceControlApp userId={user.id} userEmail={user.email} onLogout={async()=>{await supabase.auth.signOut();setUser(null);}} />;
    }



// ============ Helpers ============
const formatBRL = (value) => {
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  }).format(value || 0);
};

const parseBRL = (str) => {
  if (typeof str === 'number') return str;
  if (!str) return 0;
  const cleaned = str.toString().replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.');
  return parseFloat(cleaned) || 0;
};

const getCurrentMonth = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};

const getMonthName = (yyyymm) => {
  if (!yyyymm) return '';
  const [year, month] = yyyymm.split('-');
  const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
    'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
  return `${months[parseInt(month) - 1]} ${year}`;
};

function FinanceControlApp({ userId, userEmail, onLogout }) {
  const [data, setData] = useState(defaultData);
  const [loading, setLoading] = useState(true);
  const [showConfig, setShowConfig] = useState(false);
  const [showHistorico, setShowHistorico] = useState(false);
  const [editingComissao, setEditingComissao] = useState(false);
  const [editingEmergencia, setEditingEmergencia] = useState(false);

  const [comissaoInput, setComissaoInput] = useState('');
  const [configForm, setConfigForm] = useState({
    salarioBase: '',
    comissaoEstimada: '',
    cdiAnual: '',
    caixinhaPctCDI: '',
    fiiYieldMensal: '',
    metaRendaPassiva: ''
  });
  const [emergenciaForm, setEmergenciaForm] = useState({ meta: '', acumulado: '', metaMensal: '' });
  const [aporteEmergenciaInput, setAporteEmergenciaInput] = useState('');
  const [aporteInvestimentoInput, setAporteInvestimentoInput] = useState('');

  const [novaConta, setNovaConta] = useState({ nome: '', valor: '' });
  const [novoDesejo, setNovoDesejo] = useState({ nome: '', valor: '', prioridade: 'media' });
  const [aporteDesejoInputs, setAporteDesejoInputs] = useState({});
  const [contaValorEdit, setContaValorEdit] = useState({});
  const [contaNomeEdit, setContaNomeEdit] = useState({});

  // ===== Load on mount =====
  useEffect(() => {
    loadData(userId);
  }, []);

  async function loadData(userId) {
    try {
      const result = await supabase.from('user_data').select('data').eq('user_id', userId).single();
      if (result?.data) {
        const parsed = result.data.data;
        let merged = {
          ...defaultData,
          ...parsed,
          config: { ...defaultData.config, ...(parsed.config || {}) },
          emergencia: { ...defaultData.emergencia, ...(parsed.emergencia || {}) },
          investimentos: { ...defaultData.investimentos, ...(parsed.investimentos || {}) },
          mesAtual: { ...defaultData.mesAtual, ...(parsed.mesAtual || {}) },
          contas: parsed.contas || [],
          desejos: parsed.desejos || [],
          historico: parsed.historico || []
        };

        // Migração: converte formato antigo (número único) para lista de aportes
        if (!Array.isArray(merged.mesAtual.aportesEmergencia)) {
          const antigo = typeof merged.mesAtual.aporteEmergencia === 'number' ? merged.mesAtual.aporteEmergencia : 0;
          merged.mesAtual.aportesEmergencia = antigo > 0 ? [{ id: 'mig_e', valor: antigo, label: 'Aporte' }] : [];
        }
        if (!Array.isArray(merged.mesAtual.aportesInvestimento)) {
          const antigo = typeof merged.mesAtual.aporteInvestimento === 'number' ? merged.mesAtual.aporteInvestimento : 0;
          merged.mesAtual.aportesInvestimento = antigo > 0 ? [{ id: 'mig_i', valor: antigo, label: 'Aporte' }] : [];
        }
        delete merged.mesAtual.aporteEmergencia;
        delete merged.mesAtual.aporteInvestimento;

        // Auto rollover mensal
        const current = getCurrentMonth();
        if (merged.mesAtual.mes && merged.mesAtual.mes !== current) {
          const totContas = merged.contas.reduce((s, c) => s + (c.valor || 0), 0);
          const totDesejos = Object.values(merged.mesAtual.aportesDesejos || {}).reduce((s, v) => s + (v || 0), 0);
          const receita = (merged.config.salarioBase || 0) + (merged.mesAtual.comissao || 0);
          const aporteEm = (merged.mesAtual.aportesEmergencia || []).reduce((s, a) => s + (a.valor || 0), 0);
          const aporteInv = (merged.mesAtual.aportesInvestimento || []).reduce((s, a) => s + (a.valor || 0), 0);

          // Move aporte emergência para acumulado
          if (aporteEm > 0) {
            merged.emergencia.acumulado = (merged.emergencia.acumulado || 0) + aporteEm;
          }
          // Move aporte investimento para acumulado
          if (aporteInv > 0) {
            merged.investimentos.acumulado = (merged.investimentos.acumulado || 0) + aporteInv;
          }

          // Move aportes de desejos para guardado de cada item
          merged.desejos = merged.desejos.map(d => {
            const aporte = (merged.mesAtual.aportesDesejos || {})[d.id] || 0;
            return aporte > 0 ? { ...d, guardado: (d.guardado || 0) + aporte } : d;
          });

          if (merged.mesAtual.comissao || aporteEm || aporteInv || totDesejos) {
            merged.historico.push({
              mes: merged.mesAtual.mes,
              receita,
              contas: totContas,
              emergencia: aporteEm,
              investimento: aporteInv,
              desejos: totDesejos,
              sobra: receita - totContas - aporteEm - aporteInv - totDesejos
            });
          }

          merged.mesAtual = {
            mes: current,
            comissao: 0,
            contasPagas: [],
            aportesEmergencia: [],
            aportesInvestimento: [],
            aportesDesejos: {}
          };

          await supabase.from('user_data').upsert({ user_id: userId, data: merged, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
        }
        setData(merged);
        setComissaoInput(merged.mesAtual.comissao ? merged.mesAtual.comissao.toString().replace('.', ',') : '');
        setAporteEmergenciaInput('');
        setAporteInvestimentoInput('');
      }
    } catch (e) {
      console.log('Iniciando com dados padrão');
    }
    setLoading(false);
  }

  async function saveData(newData) {
    setData(newData);
    try {
      if (userId) { await supabase.from('user_data').upsert({ user_id: userId, data: newData, updated_at: new Date().toISOString() }, { onConflict: 'user_id' }); }
    } catch (e) {
      console.error('Erro ao salvar:', e);
    }
  }

  // ===== Calculations =====
  const salarioBase = data.config.salarioBase || 0;
  const comissaoAtual = data.mesAtual.comissao || 0;
  const receitaTotal = salarioBase + comissaoAtual;
  const totalContas = data.contas.reduce((sum, c) => sum + (c.valor || 0), 0);
  const aportesEmergenciaLista = data.mesAtual.aportesEmergencia || [];
  const aportesInvestimentoLista = data.mesAtual.aportesInvestimento || [];
  const aporteEmergencia = aportesEmergenciaLista.reduce((s, a) => s + (a.valor || 0), 0);
  const aporteInvestimento = aportesInvestimentoLista.reduce((s, a) => s + (a.valor || 0), 0);
  const aportesDesejos = data.mesAtual.aportesDesejos || {};
  const totalAportesDesejos = Object.values(aportesDesejos).reduce((s, v) => s + (v || 0), 0);
  const disponivelAposObrigatorios = receitaTotal - totalContas - aporteEmergencia - aporteInvestimento;
  const sobra = disponivelAposObrigatorios - totalAportesDesejos;

  const receitaMinima = salarioBase;
  const receitaMaxima = salarioBase + (data.config.comissaoEstimada || 0);

  const emergenciaCompleta = data.emergencia.meta > 0 && data.emergencia.acumulado >= data.emergencia.meta;
  const pctEmergencia = data.emergencia.meta > 0
    ? Math.min(100, (data.emergencia.acumulado / data.emergencia.meta) * 100)
    : 0;
  const investimentoAcumulado = data.investimentos?.acumulado || 0;

  // ===== Rendimentos =====
  const cdiAnual = data.config.cdiAnual ?? 14.65;
  const caixinhaPctCDI = data.config.caixinhaPctCDI ?? 115;
  const fiiYieldMensal = data.config.fiiYieldMensal ?? 0.9;

  // CDI mensal composto a partir da taxa anual
  const cdiMensal = Math.pow(1 + cdiAnual / 100, 1 / 12) - 1;
  const caixinhaTaxaMensal = cdiMensal * (caixinhaPctCDI / 100);
  const fiiTaxaMensal = fiiYieldMensal / 100;

  // Emergência: rendimento esperado próximo mês (bruto)
  const rendimentoProxMes = data.emergencia.acumulado * caixinhaTaxaMensal;
  const saldoEmergencia12m = data.emergencia.acumulado * Math.pow(1 + caixinhaTaxaMensal, 12);

  // Meses até atingir a meta, considerando aporte mensal + rendimento composto
  function mesesParaMeta() {
    const r = caixinhaTaxaMensal;
    const a = data.emergencia.metaMensal || 0;
    const P = data.emergencia.acumulado || 0;
    const M = data.emergencia.meta || 0;
    if (M <= 0 || P >= M) return 0;
    if (r <= 0) return a > 0 ? Math.ceil((M - P) / a) : Infinity;
    if (a <= 0) return P > 0 ? Math.ceil(Math.log(M / P) / Math.log(1 + r)) : Infinity;
    const num = M + a / r;
    const den = P + a / r;
    return Math.ceil(Math.log(num / den) / Math.log(1 + r));
  }
  const mesesAteMeta = mesesParaMeta();

  // Quanto vira aporte pra investimentos na Fase 2
  const aporteInvestMensal = data.emergencia.metaMensal || 300;

  // FIIs: renda mensal atual estimada e projeções
  const rendaMensalFII = investimentoAcumulado * fiiTaxaMensal;

  function projetarFII(meses) {
    const P = investimentoAcumulado;
    const r = fiiTaxaMensal;
    const a = aporteInvestMensal;
    if (r === 0) return { patrimonio: P + a * meses, renda: 0 };
    const patrimonio = P * Math.pow(1 + r, meses) + a * ((Math.pow(1 + r, meses) - 1) / r);
    return { patrimonio, renda: patrimonio * r };
  }

  const projecoes = [
    { label: '1 ano', meses: 12 },
    { label: '5 anos', meses: 60 },
    { label: '10 anos', meses: 120 },
    { label: '20 anos', meses: 240 }
  ].map(p => ({ ...p, ...projetarFII(p.meses) }));

  // ===== Previsão de renda passiva alvo =====
  // Saldos efetivos: confirmado + aportes pendentes do mês (atualiza ao registrar aporte)
  const effEmergencia = (data.emergencia.acumulado || 0) + aporteEmergencia;
  const effInvestimento = investimentoAcumulado + aporteInvestimento;
  const metaRendaPassiva = data.config.metaRendaPassiva ?? 6000;
  const patrimonioAlvoRenda = fiiTaxaMensal > 0 ? metaRendaPassiva / fiiTaxaMensal : 0;
  const rendaPassivaAtual = effInvestimento * fiiTaxaMensal;

  function mesesParaMetaDe(saldoInicial) {
    const r = caixinhaTaxaMensal;
    const a = data.emergencia.metaMensal || 0;
    const M = data.emergencia.meta || 0;
    const P = saldoInicial;
    if (M <= 0 || P >= M) return 0;
    if (r <= 0) return a > 0 ? Math.ceil((M - P) / a) : Infinity;
    if (a <= 0) return P > 0 ? Math.ceil(Math.log(M / P) / Math.log(1 + r)) : Infinity;
    const num = M + a / r;
    const den = P + a / r;
    return Math.ceil(Math.log(num / den) / Math.log(1 + r));
  }

  function mesesAteRendaPassiva() {
    const r = fiiTaxaMensal;
    if (r <= 0 || patrimonioAlvoRenda <= 0) return Infinity;
    if (effInvestimento >= patrimonioAlvoRenda) return 0;

    // Investir em FIIs desde agora, independente da emergência
    // FV = P(1+r)^n + a * ((1+r)^n - 1) / r = patrimônio alvo
    // Resolvendo para n
    const P = effInvestimento;
    const a = aporteInvestMensal;
    const M = patrimonioAlvoRenda;

    if (a <= 0) {
      if (P <= 0) return Infinity;
      // Só composto: M = P(1+r)^n → n = log(M/P) / log(1+r)
      return Math.ceil(Math.log(M / P) / Math.log(1 + r));
    }
    // Com aporte mensal
    const num = M + a / r;
    const den = P + a / r;
    if (den <= 0) return Infinity;
    const m = Math.log(num / den) / Math.log(1 + r);
    return Math.ceil(m);
  }
  const mesesAteRenda = mesesAteRendaPassiva();

  function formatPrazo(meses) {
    if (!isFinite(meses)) return '—';
    if (meses <= 0) return 'Meta atingida!';
    const anos = Math.floor(meses / 12);
    const m = meses % 12;
    const partes = [];
    if (anos > 0) partes.push(`${anos} ${anos === 1 ? 'ano' : 'anos'}`);
    if (m > 0) partes.push(`${m} ${m === 1 ? 'mês' : 'meses'}`);
    return partes.join(' e ') || '0 meses';
  }

  function dataFutura(meses) {
    if (!isFinite(meses) || meses <= 0) return '';
    const d = new Date();
    d.setMonth(d.getMonth() + meses);
    const meses3 = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
    return `${meses3[d.getMonth()]}/${d.getFullYear()}`;
  }
  const pctRendaPassiva = patrimonioAlvoRenda > 0
    ? Math.min(100, (effInvestimento / patrimonioAlvoRenda) * 100)

  // ===== Handlers =====
  const handleComissaoSave = () => {

    saveData({ ...data, mesAtual: { ...data.mesAtual, aportesEmergencia: lista } });

  const addConta = () => {

        contasPagas: data.mesAtual.contasPagas.filter(cid => cid !== id)

  const updateContaValor = (id, valorStr) => {

    const novo = {
      ...data,
      contas: data.contas.map(c => c.id === id ? { ...c, valor: novoValor } : c)

    const novos = { ...contaValorEdit };

  const updateContaNome = (id, nomeStr) => {
    const nome = (nomeStr || '').trim();
    if (!nome) {
      const novos = { ...contaNomeEdit };
      delete novos[id];

      contas: data.contas.map(c => c.id === id ? { ...c, nome } : c)

  const addDesejo = () => {

      desejos: [...data.desejos, {
        id: Date.now().toString(),

                    fiiYieldMensal: (data.config.fiiYieldMensal ?? 0.9).toString().replace('.', ','),

          {/* Add new desejo */}
          <div className="p-4 rounded-xl space-y-2" style={{ backgroundColor: t.surfaceAlt, border: `1px dashed ${t.borderStrong}` }}>
            <div className="text-xs uppercase tracking-wider font-medium mb-2" style={{ color: t.textMuted }}>
              Novo desejo
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-[1fr,140px] gap-2">
              <TextInput
                value={novoDesejo.nome}
                onChange={(v) => setNovoDesejo({ ...novoDesejo, nome: v })}
                placeholder="Ex: Notebook, viagem, curso..."
              />
              <MoneyInput
                value={novoDesejo.valor}
                onChange={(v) => setNovoDesejo({ ...novoDesejo, valor: v })}
              />
            </div>
            <div className="flex gap-2 items-center">
              <div className="flex gap-1.5">
                {Object.entries(PRIORIDADES).map(([key, p]) => (
                  <button
                    key={key}
                    onClick={() => setNovoDesejo({ ...novoDesejo, prioridade: key })}
                    className="text-xs px-2.5 py-1.5 rounded-md font-medium transition-all"
                    style={{
                      backgroundColor: novoDesejo.prioridade === key ? p.color : 'transparent',
                      color: novoDesejo.prioridade === key ? 'white' : p.color,
                      border: `1px solid ${novoDesejo.prioridade === key ? p.color : t.border}`
                    }}
                  >
                    {p.label}
                  </button>
                ))}
              </div>
              <button
                onClick={addDesejo}
                className="ml-auto px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1.5"
                style={{ backgroundColor: t.accent, color: 'white' }}
              >
                <Plus size={14} /> Adicionar
              </button>
            </div>
          </div>
        </Section>

        {/* ===== HISTÓRICO ===== */}
        {data.historico.length > 0 && (
          <Section
            icon={<History size={18} />}
            title="Histórico mensal"
            subtitle={`${data.historico.length} ${data.historico.length === 1 ? 'mês registrado' : 'meses registrados'}`}
            action={
              <button
                onClick={() => setShowHistorico(!showHistorico)}
                className="text-xs flex items-center gap-1 px-2.5 py-1 rounded-md"
                style={{ color: t.textMuted, border: `1px solid ${t.border}` }}
              >
                {showHistorico ? <ChevronUp size={12} /> : <ChevronDown size={12} />}
                {showHistorico ? 'Ocultar' : 'Mostrar'}
              </button>
            }
          >
            {showHistorico && (
              <div className="space-y-2">
                {[...data.historico].reverse().map((h, i) => (
                  <div key={i} className="p-3 rounded-lg" style={{ backgroundColor: t.surface, border: `1px solid ${t.border}` }}>
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-medium text-sm" style={{ color: t.text }}>{getMonthName(h.mes)}</span>
                      <span className="serif num text-lg" style={{ color: t.ink }}>{formatBRL(h.receita)}</span>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 text-xs">
                      <MiniStat label="Contas" value={h.contas} color={t.amber} />
                      <MiniStat label="Emergência" value={h.emergencia} color={t.positive} />
                      <MiniStat label="Investido" value={h.investimento || 0} color="#5A8DBF" />
                      <MiniStat label="Desejos" value={h.desejos} color={t.accent} />
                      <MiniStat label="Sobra" value={h.sobra} color={h.sobra >= 0 ? t.positive : t.accent} highlight />
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Section>
        )}

        <footer className="mt-12 pt-6 text-center text-xs" style={{ color: t.textSubtle, borderTop: `1px solid ${t.border}` }}>
          Seus dados ficam salvos localmente. Ao virar o mês, os aportes são arquivados automaticamente.
        </footer>
      </div>
    </div>
  );
}

// ============ Sub-components ============
function Section({ icon, title, subtitle, action, children }) {
  return (
    <section className="mb-6">
      <div className="flex items-center justify-between mb-4 px-1">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-full flex items-center justify-center" style={{ backgroundColor: t.surface, border: `1px solid ${t.border}`, color: t.accent }}>
            {icon}
          </div>
          <div>
            <h2 className="serif text-xl font-medium" style={{ color: t.ink }}>{title}</h2>
            <p className="text-xs num" style={{ color: t.textMuted }}>{subtitle}</p>
          </div>
        </div>
        {action}
      </div>
      {children}
    </section>
  );
}

function AllocationBar({ label, value, total, color, icon }) {
  const pct = total > 0 ? (value / total) * 100 : 0;
  return (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <div className="flex items-center gap-2 opacity-80">
          {icon}
          <span>{label}</span>
        </div>
        <span className="num font-medium">{formatBRL(value)}</span>
      </div>
      <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: 'rgba(255,255,255,0.1)' }}>
        <div className="h-full rounded-full transition-all" style={{ width: `${Math.min(100, pct)}%`, backgroundColor: color }} />
      </div>
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div className="text-center py-6 text-sm rounded-xl" style={{ color: t.textMuted, backgroundColor: t.surfaceAlt, border: `1px dashed ${t.border}` }}>
      {text}
    </div>
  );
}

function MiniStat({ label, value, color, highlight }) {
  return (
    <div className="p-2 rounded" style={{ backgroundColor: highlight ? t.surfaceAlt : 'transparent', border: highlight ? `1px solid ${t.border}` : 'none' }}>
      <div className="text-[10px] uppercase tracking-wider font-medium mb-0.5" style={{ color: t.textMuted }}>{label}</div>
      <div className="num text-sm font-medium" style={{ color }}>{formatBRL(value)}</div>
    </div>
  );
}

function AporteCard({ lista, total, metaMinima, inputValue, setInputValue, onAdd, onRemove, accentColor }) {
  const metaBatida = metaMinima > 0 && total >= metaMinima;
  const pct = metaMinima > 0 ? Math.min(100, (total / metaMinima) * 100) : (total > 0 ? 100 : 0);
  const extra = metaMinima > 0 ? Math.max(0, total - metaMinima) : 0;
  return (
    <div className="p-4 rounded-xl" style={{ backgroundColor: t.surfaceAlt, border: `1px solid ${t.border}` }}>
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-xs uppercase tracking-wider font-medium" style={{ color: t.textMuted }}>Aportes deste mês</span>
        {metaMinima > 0 && (
          <span className="text-[11px] num font-medium" style={{ color: metaBatida ? t.positive : t.textMuted }}>
            {metaBatida ? '✓ meta mínima' : `mínimo ${formatBRL(metaMinima)}`}
          </span>
        )}
      </div>
      <div className="serif num text-2xl font-medium mb-2" style={{ color: total > 0 ? accentColor : t.textSubtle }}>
        {formatBRL(total)}
        {extra > 0 && (
          <span className="text-xs font-normal ml-2" style={{ color: t.positive }}>
            +{formatBRL(extra)} além do mínimo
          </span>
        )}
      </div>
      {metaMinima > 0 && (
        <div className="h-1.5 rounded-full overflow-hidden mb-3" style={{ backgroundColor: t.border }}>
          <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, backgroundColor: metaBatida ? t.positive : accentColor }} />
        </div>
      )}

      {lista.length > 0 && (
        <div className="space-y-1.5 mb-3">
          {lista.map((a, i) => (
            <div key={a.id} className="flex items-center justify-between text-sm px-3 py-2 rounded-lg" style={{ backgroundColor: t.surface, border: `1px solid ${t.border}` }}>
              <span style={{ color: t.textMuted }}>{a.label || `Aporte ${i + 1}`}</span>
              <div className="flex items-center gap-2">
                <span className="num font-medium" style={{ color: t.text }}>{formatBRL(a.valor)}</span>
                <button onClick={() => onRemove(a.id)} className="p-0.5 rounded transition-colors" style={{ color: t.textSubtle }} title="Remover">
                  <X size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="flex gap-2 items-center">
        <MoneyInput
          value={inputValue}
          onChange={setInputValue}
          placeholder={metaMinima ? metaMinima.toString().replace('.', ',') : '0,00'}
          onKeyDown={(e) => e.key === 'Enter' && onAdd()}
        />
        <button onClick={onAdd} className="px-4 py-2.5 rounded-lg text-sm font-medium whitespace-nowrap flex items-center gap-1" style={{ backgroundColor: accentColor, color: 'white' }}>
          <Plus size={15} /> Aportar
        </button>
      </div>
      <p className="text-[11px] mt-2" style={{ color: t.textSubtle }}>
        Adicione quantos aportes quiser no mês — cada um soma ao total. No fim do mês tudo é arquivado de uma vez.
      </p>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
